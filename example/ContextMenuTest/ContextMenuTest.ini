[Rainmeter]
Update=1000

[Metadata]
Name=ContextMenuTest
Author=Kurou
Information=Demo skin for the ContextMenu plugin. Right-click the box to open the custom menu.
Version=1.0

; The measure that takes over this skin's right-click menu. Its only option is
; Menu= — a path to a menu-definition file (Rainmeter INI). #@# resolves to the
; skin's @Resources folder.
[MeasureCtx]
Measure=Plugin
Plugin=ContextMenu
Menu=#@#menu.inc

[MeterBg]
Meter=Image
SolidColor=40,40,40,255
W=220
H=120

[MeterLabel]
Meter=String
X=110
Y=60
StringAlign=CenterCenter
FontColor=230,230,230,255
FontSize=11
Text=Right-click me
